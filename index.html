<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ბარკოდის სკანერი</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #eee);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 12px 16px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            background: var(--tg-theme-secondary-bg-color, #16213e);
        }
        #reader {
            width: 100%;
            max-width: 500px;
            max-height: 35vh;
            margin: 0 auto;
            overflow: hidden;
        }
        #reader video {
            border-radius: 8px;
            max-height: 35vh;
            object-fit: cover;
        }
        /* Native კამერის კონტეინერი */
        #nativeCamera {
            width: 100%;
            max-width: 500px;
            max-height: 35vh;
            margin: 0 auto;
            position: relative;
            display: none;
            overflow: hidden;
        }
        #nativeCamera video {
            width: 100%;
            max-height: 35vh;
            object-fit: cover;
            border-radius: 8px;
        }
        #nativeCamera canvas {
            display: none;
        }
        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 150px;
            border: 2px solid rgba(46, 204, 113, 0.7);
            border-radius: 8px;
            pointer-events: none;
        }
        .scan-overlay.detecting {
            border-color: #f39c12;
            animation: pulse 0.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .scan-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px 16px;
        }
        .scan-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: #2ecc71;
            color: #fff;
            min-width: 160px;
        }
        .scan-btn.scanning {
            background: #e74c3c;
        }
        .scan-btn.paused {
            background: #f39c12;
        }
        .scan-btn:active { opacity: 0.7; }
        .scan-btn:disabled { opacity: 0.4; }
        .torch-btn {
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            background: var(--tg-theme-secondary-bg-color, #16213e);
            color: var(--tg-theme-text-color, #eee);
            border: 1px solid var(--tg-theme-hint-color, #555);
            display: none;
        }
        .torch-btn.active {
            background: #f39c12;
            color: #000;
            border-color: #f39c12;
        }
        .torch-btn:active { opacity: 0.7; }
        .scan-list {
            flex: 1;
            padding: 8px 16px;
            overflow-y: auto;
            max-height: 40vh;
        }
        .scan-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; } }
        .scan-item .code {
            font-size: 15px;
            font-weight: 500;
            flex: 1;
            word-break: break-all;
        }
        .scan-item .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 10px;
        }
        .qty-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-btn:active { opacity: 0.7; }
        .qty-num {
            font-size: 16px;
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }
        .remove-btn {
            width: 28px; height: 28px;
            border-radius: 50%;
            border: none;
            background: #e74c3c;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            margin-left: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bottom-bar {
            padding: 10px 16px 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-send {
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
        }
        .btn-clear {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            color: var(--tg-theme-text-color, #eee);
            border: 1px solid var(--tg-theme-hint-color, #555);
        }
        .btn:disabled { opacity: 0.4; }
        .btn:active:not(:disabled) { opacity: 0.7; }
        .empty-msg {
            text-align: center;
            color: var(--tg-theme-hint-color, #888);
            padding: 30px 16px;
            font-size: 14px;
        }
        .total-bar {
            text-align: center;
            padding: 6px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #aaa);
        }
        .status-msg {
            text-align: center;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        .status-ok { color: #2ecc71; }
        .status-err { color: #e74c3c; }
        .last-scan {
            text-align: center;
            padding: 4px;
            font-size: 12px;
            color: #2ecc71;
        }
        .confidence-bar {
            text-align: center;
            padding: 2px;
            font-size: 11px;
            color: var(--tg-theme-hint-color, #888);
        }
        /* ხელით შეყვანის ველი */
        .manual-input-bar {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
        }
        .manual-input-bar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--tg-theme-hint-color, #555);
            background: var(--tg-theme-secondary-bg-color, #16213e);
            color: var(--tg-theme-text-color, #eee);
            font-size: 15px;
        }
        .manual-input-bar button {
            padding: 10px 16px;
            border-radius: 10px;
            border: none;
            background: var(--tg-theme-button-color, #0088cc);
            color: var(--tg-theme-button-text-color, #fff);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .engine-badge {
            text-align: center;
            padding: 2px 8px;
            font-size: 10px;
            color: var(--tg-theme-hint-color, #666);
        }
    </style>
</head>
<body>
    <div class="header" id="headerText">📷 ბარკოდის სკანერი</div>
    <!-- Native BarcodeDetector camera -->
    <div id="nativeCamera">
        <video id="nativeVideo" autoplay playsinline muted></video>
        <canvas id="nativeCanvas"></canvas>
        <div class="scan-overlay" id="scanOverlay"></div>
    </div>
    <!-- html5-qrcode fallback -->
    <div id="reader"></div>
    <div class="last-scan" id="lastScan"></div>
    <div class="confidence-bar" id="confidenceBar"></div>
    <div class="engine-badge" id="engineBadge"></div>
    <div class="scan-controls">
        <button class="scan-btn" id="scanBtn" onclick="toggleScanner()">📸 სკანირება</button>
        <button class="torch-btn" id="torchBtn" onclick="toggleTorch()">🔦</button>
    </div>
    <!-- ხელით შეყვანის ველი -->
    <div class="manual-input-bar">
        <input type="text" id="manualCode" placeholder="კოდი ხელით..." autocomplete="off" />
        <button onclick="addManualCode()">➕</button>
    </div>
    <div class="scan-list" id="scanList">
        <div class="empty-msg">📸 დააჭირე სკანირებას ან ხელით შეიყვანე კოდი</div>
    </div>
    <div class="total-bar" id="totalBar"></div>
    <div id="statusMsg"></div>
    <div class="bottom-bar">
        <button class="btn btn-clear" id="clearBtn" onclick="clearAll()">🗑 გასუფთავება</button>
        <button class="btn btn-send" id="sendBtn" onclick="sendData()" disabled>✅ დასრულება</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Cloudflare Worker relay URL
        const WORKER_URL = 'https://scanner-relay.office-adtec.workers.dev';
        const BOT_NAME = 'adtwarehousebot';

        // ოპერაციის კონტექსტის წაკითხვა
        let opType = '';
        let buyerId = '0';

        const startParam = (tg.initDataUnsafe && tg.initDataUnsafe.start_param) || '';
        if (startParam) {
            const idx = startParam.indexOf('_');
            if (idx > 0) {
                opType = startParam.substring(0, idx);
                buyerId = startParam.substring(idx + 1) || '0';
            } else {
                opType = startParam;
            }
        }
        if (!opType) {
            const urlParams = new URLSearchParams(window.location.search);
            // web_app= ღილაკით URL-ში ?startapp=SALE_235 ფორმატით მოდის
            const urlStartApp = urlParams.get('startapp') || '';
            if (urlStartApp) {
                const idx2 = urlStartApp.indexOf('_');
                if (idx2 > 0) {
                    opType = urlStartApp.substring(0, idx2);
                    buyerId = urlStartApp.substring(idx2 + 1) || '0';
                } else {
                    opType = urlStartApp;
                }
            } else {
                opType = urlParams.get('op') || '';
                buyerId = urlParams.get('bid') || '0';
            }
        }

        const headerEl = document.getElementById('headerText');
        if (opType === 'SALE') {
            headerEl.textContent = '📷 სკანერი — 📤 გასაწერი';
        } else if (opType === 'WRITEOFF') {
            headerEl.textContent = '📷 სკანერი — 📥 ჩამოსაწერი';
        } else if (opType === 'PURCHASE') {
            headerEl.textContent = '📷 სკანერი — 📦 შეძენა';
        }

        let scannedItems = [];
        let lastScannedCode = '';
        let lastScannedTime = 0;

        // კამერის მდგომარეობა
        let cameraStarted = false;
        let scanningActive = false;

        // ===== Multi-scan consensus =====
        // რამდენიმე ფრეიმის სკანირება და ყველაზე ხშირი შედეგის არჩევა
        const CONSENSUS_THRESHOLD = 3;  // მინ. 3-ჯერ ერთი და იგივე კოდი
        const CONSENSUS_WINDOW = 2000;  // 2 წამის ფანჯარა
        let scanBuffer = [];  // [{code, time}, ...]

        function addToBuffer(code) {
            const now = Date.now();
            // ძველი ჩანაწერების წაშლა (2 წამზე ძველი)
            scanBuffer = scanBuffer.filter(s => (now - s.time) < CONSENSUS_WINDOW);
            scanBuffer.push({ code: code, time: now });

            // რომელი კოდი ჩანს ყველაზე ხშირად?
            const counts = {};
            scanBuffer.forEach(s => {
                counts[s.code] = (counts[s.code] || 0) + 1;
            });

            let bestCode = null;
            let bestCount = 0;
            for (const [c, cnt] of Object.entries(counts)) {
                if (cnt > bestCount) {
                    bestCount = cnt;
                    bestCode = c;
                }
            }

            // Confidence ბარის განახლება
            const confBar = document.getElementById('confidenceBar');
            const overlay = document.getElementById('scanOverlay');
            if (bestCode && bestCount < CONSENSUS_THRESHOLD) {
                confBar.textContent = `🔍 ${bestCode} (${bestCount}/${CONSENSUS_THRESHOLD})`;
                if (overlay) overlay.classList.add('detecting');
            }

            if (bestCode && bestCount >= CONSENSUS_THRESHOLD) {
                // ✅ კონსენსუსი მიღწეულია!
                scanBuffer = [];
                confBar.textContent = '';
                if (overlay) overlay.classList.remove('detecting');
                return bestCode;
            }

            return null;  // ჯერ არ არის საკმარისი
        }

        // ===== Engine Detection =====
        const useNative = ('BarcodeDetector' in window);
        let nativeBarcodeDetector = null;
        let nativeStream = null;
        let nativeAnimFrame = null;
        let html5Qrcode = null;
        let torchOn = false;
        let torchSupported = false;
        let darkFrameCount = 0;          // auto-torch: ბნელი ფრეიმების მთვლელი
        let autoTorchTriggered = false;   // auto-torch: უკვე ჩაირთო?
        let h5EnhanceInterval = null;     // html5-qrcode enhanced scan loop

        if (useNative) {
            document.getElementById('engineBadge').textContent = '⚡ Native BarcodeDetector';
        } else {
            document.getElementById('engineBadge').textContent = '📦 html5-qrcode (ZXing)';
            html5Qrcode = new Html5Qrcode("reader");
        }

        const html5Config = {
            fps: 15,
            qrbox: { width: 280, height: 150 },
            aspectRatio: 1.5,
            formatsToSupport: [
                Html5QrcodeSupportedFormats.EAN_13,
                Html5QrcodeSupportedFormats.EAN_8,
                Html5QrcodeSupportedFormats.CODE_128,
                Html5QrcodeSupportedFormats.CODE_39,
                Html5QrcodeSupportedFormats.CODE_93,
                Html5QrcodeSupportedFormats.UPC_A,
                Html5QrcodeSupportedFormats.UPC_E,
                Html5QrcodeSupportedFormats.ITF,
                Html5QrcodeSupportedFormats.QR_CODE,
                Html5QrcodeSupportedFormats.DATA_MATRIX,
            ]
        };

        // ===== Native BarcodeDetector სკანირება =====
        async function startNativeCamera() {
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.disabled = true;
            scanBtn.textContent = '⏳ კამერა იხსნება...';

            try {
                // BarcodeDetector ინიციალიზაცია
                nativeBarcodeDetector = new BarcodeDetector({
                    formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'code_93',
                              'upc_a', 'upc_e', 'itf', 'qr_code', 'data_matrix']
                });

                // კამერის გახსნა მაღალი რეზოლუციით + torch მხარდაჭერა
                nativeStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        focusMode: { ideal: 'continuous' },
                        exposureMode: { ideal: 'continuous' },
                        whiteBalanceMode: { ideal: 'continuous' }
                    }
                });

                const video = document.getElementById('nativeVideo');
                video.srcObject = nativeStream;
                await video.play();

                // Torch მხარდაჭერის შემოწმება
                checkTorchSupport(nativeStream);

                document.getElementById('nativeCamera').style.display = 'block';
                document.getElementById('reader').style.display = 'none';

                cameraStarted = true;
                scanningActive = true;
                scanBtn.disabled = false;
                scanBtn.textContent = '⏸ პაუზა';
                scanBtn.className = 'scan-btn scanning';

                // სკანირების ციკლის დაწყება
                nativeScanLoop();
            } catch (err) {
                scanBtn.disabled = false;
                scanBtn.textContent = '📸 სკანირება';
                scanBtn.className = 'scan-btn';
                document.getElementById('lastScan').textContent = '❌ კამერა: ' + err.message;
                setTimeout(() => {
                    document.getElementById('lastScan').textContent = '';
                }, 3000);
            }
        }

        async function nativeScanLoop() {
            if (!cameraStarted) return;

            const video = document.getElementById('nativeVideo');
            if (video.readyState < 2) {
                nativeAnimFrame = requestAnimationFrame(nativeScanLoop);
                return;
            }

            if (scanningActive && nativeBarcodeDetector) {
                try {
                    // 1. პირდაპირ ვიდეოდან
                    let barcodes = await nativeBarcodeDetector.detect(video);

                    // 2. Brightness/contrast enhancement
                    if (barcodes.length === 0) {
                        const bright = enhanceFrame(video, 'brighten');
                        if (bright) barcodes = await nativeBarcodeDetector.detect(bright);
                    }

                    // 3. Grayscale + binarization (შავ-თეთრი)
                    if (barcodes.length === 0) {
                        const bin = enhanceFrame(video, 'binarize');
                        if (bin) barcodes = await nativeBarcodeDetector.detect(bin);
                    }

                    // 4. Sharpen (ხაზების გამოკვეთა)
                    if (barcodes.length === 0) {
                        const sharp = enhanceFrame(video, 'sharpen');
                        if (sharp) barcodes = await nativeBarcodeDetector.detect(sharp);
                    }

                    for (const barcode of barcodes) {
                        if (barcode.rawValue) {
                            handleRawScan(barcode.rawValue);
                        }
                    }
                } catch (err) {
                    // იგნორი
                }
            }

            setTimeout(() => {
                nativeAnimFrame = requestAnimationFrame(nativeScanLoop);
            }, 80);
        }

        // ===== Image Enhancement Strategies =====

        // საშუალო სიკაშკაშის გამოთვლა
        function getAvgBrightness(data) {
            let total = 0, samples = 0;
            for (let i = 0; i < data.length; i += 80) {
                total += (data[i] + data[i+1] + data[i+2]) / 3;
                samples++;
            }
            const avg = total / samples;

            // Auto-torch: თუ ზედიზედ 15 ფრეიმი ბნელია — ფანარი ავტომატურად ჩაირთოს
            if (avg < 70) {
                darkFrameCount++;
                if (darkFrameCount >= 15 && torchSupported && !torchOn && !autoTorchTriggered) {
                    autoTorchTriggered = true;
                    toggleTorch();
                }
            } else {
                darkFrameCount = Math.max(0, darkFrameCount - 1);
            }

            return avg;
        }

        // ფრეიმის canvas-ზე გადატანა
        function captureToCanvas(video) {
            const canvas = document.getElementById('nativeCanvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const w = video.videoWidth;
            const h = video.videoHeight;
            if (!w || !h) return null;
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(video, 0, 0, w, h);
            return { canvas, ctx, w, h };
        }

        function enhanceFrame(video, mode) {
            try {
                const cap = captureToCanvas(video);
                if (!cap) return null;
                const { canvas, ctx, w, h } = cap;
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;
                const avgBright = getAvgBrightness(data);

                if (mode === 'brighten') {
                    // ნათელისთვის არ სჭირდება
                    if (avgBright > 120) return null;
                    const boost = Math.min(80, Math.max(20, 150 - avgBright));
                    const contrast = avgBright < 60 ? 2.0 : 1.5;
                    const mid = 128;
                    for (let i = 0; i < data.length; i += 4) {
                        for (let c = 0; c < 3; c++) {
                            let v = data[i + c];
                            v = (v - mid) * contrast + mid + boost;
                            data[i + c] = v < 0 ? 0 : v > 255 ? 255 : v;
                        }
                    }
                } else if (mode === 'binarize') {
                    // Grayscale → Otsu-ს მსგავსი ადაპტური threshold
                    // ჯერ grayscale
                    for (let i = 0; i < data.length; i += 4) {
                        const gray = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                        data[i] = data[i+1] = data[i+2] = gray;
                    }
                    // Histogram-ით threshold-ის გამოთვლა (Otsu)
                    const hist = new Uint32Array(256);
                    for (let i = 0; i < data.length; i += 4) hist[data[i]]++;
                    const totalPx = data.length / 4;
                    let sumAll = 0;
                    for (let t = 0; t < 256; t++) sumAll += t * hist[t];
                    let sumB = 0, wB = 0, maxVar = 0, threshold = 128;
                    for (let t = 0; t < 256; t++) {
                        wB += hist[t];
                        if (wB === 0) continue;
                        const wF = totalPx - wB;
                        if (wF === 0) break;
                        sumB += t * hist[t];
                        const mB = sumB / wB;
                        const mF = (sumAll - sumB) / wF;
                        const between = wB * wF * (mB - mF) * (mB - mF);
                        if (between > maxVar) { maxVar = between; threshold = t; }
                    }
                    // Binarize
                    for (let i = 0; i < data.length; i += 4) {
                        const v = data[i] > threshold ? 255 : 0;
                        data[i] = data[i+1] = data[i+2] = v;
                    }
                } else if (mode === 'sharpen') {
                    // Unsharp mask: sharpen kernel convolution
                    if (avgBright > 150) return null; // ნათელი სურათი — არ სჭირდება
                    const src = new Uint8ClampedArray(data);
                    // kernel: 0 -1 0 / -1 5 -1 / 0 -1 0
                    for (let y = 1; y < h - 1; y++) {
                        for (let x = 1; x < w - 1; x++) {
                            const idx = (y * w + x) * 4;
                            for (let c = 0; c < 3; c++) {
                                const v = 5 * src[idx + c]
                                    - src[((y-1)*w + x)*4 + c]
                                    - src[((y+1)*w + x)*4 + c]
                                    - src[(y*w + x-1)*4 + c]
                                    - src[(y*w + x+1)*4 + c];
                                data[idx + c] = v < 0 ? 0 : v > 255 ? 255 : v;
                            }
                        }
                    }
                }

                ctx.putImageData(imageData, 0, 0);
                return canvas;
            } catch (e) {
                return null;
            }
        }

        function stopNativeCamera() {
            if (nativeAnimFrame) {
                cancelAnimationFrame(nativeAnimFrame);
                nativeAnimFrame = null;
            }
            if (nativeStream) {
                nativeStream.getTracks().forEach(t => t.stop());
                nativeStream = null;
            }
            const video = document.getElementById('nativeVideo');
            if (video) video.srcObject = null;
            document.getElementById('nativeCamera').style.display = 'none';
            cameraStarted = false;
            scanningActive = false;
            torchOn = false;
            torchSupported = false;
            darkFrameCount = 0;
            autoTorchTriggered = false;
            document.getElementById('torchBtn').style.display = 'none';
            document.getElementById('torchBtn').classList.remove('active');
        }

        // ===== Torch (ფანარი) =====
        function checkTorchSupport(stream) {
            try {
                const track = stream.getVideoTracks()[0];
                if (!track) return;
                const caps = track.getCapabilities ? track.getCapabilities() : {};
                if (caps.torch) {
                    torchSupported = true;
                    document.getElementById('torchBtn').style.display = 'block';
                }
            } catch (e) {
                torchSupported = false;
            }
        }

        async function toggleTorch() {
            if (!torchSupported) return;
            const stream = nativeStream || (html5Qrcode && html5Qrcode.getRunningTrackSettings ? getHtml5Stream() : null);
            if (!stream) return;
            try {
                const track = stream.getVideoTracks()[0];
                if (!track) return;
                torchOn = !torchOn;
                await track.applyConstraints({ advanced: [{ torch: torchOn }] });
                const btn = document.getElementById('torchBtn');
                btn.classList.toggle('active', torchOn);
                btn.textContent = torchOn ? '🔦' : '🔦';
            } catch (e) {
                console.log('Torch error:', e);
            }
        }

        function getHtml5Stream() {
            // html5-qrcode ვიდეო ელემენტიდან stream-ის ამოღება
            try {
                const videoEl = document.querySelector('#reader video');
                if (videoEl && videoEl.srcObject) return videoEl.srcObject;
            } catch(e) {}
            return null;
        }

        // ===== html5-qrcode fallback =====
        function startHtml5Camera() {
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.disabled = true;
            scanBtn.textContent = '⏳ კამერა იხსნება...';

            document.getElementById('nativeCamera').style.display = 'none';
            document.getElementById('reader').style.display = 'block';

            html5Qrcode.start(
                { facingMode: "environment" },
                html5Config,
                onHtml5ScanSuccess,
                () => {} // failure იგნორი
            ).then(() => {
                cameraStarted = true;
                scanningActive = true;
                scanBtn.disabled = false;
                scanBtn.textContent = '⏸ პაუზა';
                scanBtn.className = 'scan-btn scanning';
                // Torch მხარდაჭერის შემოწმება html5-qrcode-სთვის
                const h5stream = getHtml5Stream();
                if (h5stream) checkTorchSupport(h5stream);
                // Enhanced scan loop — canvas + binarize
                startH5EnhancedScan();
            }).catch(err => {
                scanBtn.disabled = false;
                scanBtn.textContent = '📸 სკანირება';
                scanBtn.className = 'scan-btn';
                document.getElementById('lastScan').textContent = '❌ კამერა: ' + err;
                setTimeout(() => {
                    document.getElementById('lastScan').textContent = '';
                }, 3000);
            });
        }

        function onHtml5ScanSuccess(decodedText, decodedResult) {
            if (!scanningActive) return;
            handleRawScan(decodedText);
        }

        // ===== html5-qrcode enhanced scan — ყოველ 500ms canvas-based enhancement =====
        function startH5EnhancedScan() {
            if (h5EnhanceInterval) return;
            h5EnhanceInterval = setInterval(async () => {
                if (!scanningActive || !cameraStarted) return;
                try {
                    const videoEl = document.querySelector('#reader video');
                    if (!videoEl || videoEl.readyState < 2) return;

                    // Auto-torch ლოგიკა html5-qrcode-სთვისაც
                    const tmpCanvas = document.createElement('canvas');
                    const tmpCtx = tmpCanvas.getContext('2d', { willReadFrequently: true });
                    const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
                    if (!vw || !vh) return;
                    tmpCanvas.width = vw;
                    tmpCanvas.height = vh;
                    tmpCtx.drawImage(videoEl, 0, 0, vw, vh);
                    const tmpData = tmpCtx.getImageData(0, 0, vw, vh).data;
                    getAvgBrightness(tmpData);

                    // Enhanced frame → html5Qrcode.scanFile
                    // Binarized version — ყველაზე ეფექტურია ბარკოდისთვის
                    const enhCanvas = document.createElement('canvas');
                    enhCanvas.width = vw;
                    enhCanvas.height = vh;
                    const enhCtx = enhCanvas.getContext('2d', { willReadFrequently: true });
                    enhCtx.drawImage(videoEl, 0, 0, vw, vh);
                    const imgData = enhCtx.getImageData(0, 0, vw, vh);
                    const d = imgData.data;

                    // Brightness boost + binarize combo
                    for (let i = 0; i < d.length; i += 4) {
                        let gray = d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114;
                        gray = Math.min(255, gray * 1.4 + 30); // boost
                        d[i] = d[i+1] = d[i+2] = gray > 140 ? 255 : 0;
                    }
                    enhCtx.putImageData(imgData, 0, 0);

                    // Canvas → Blob → scan
                    enhCanvas.toBlob(async (blob) => {
                        if (!blob || !scanningActive) return;
                        try {
                            const file = new File([blob], 'frame.png', { type: 'image/png' });
                            const result = await html5Qrcode.scanFileV2(file, false);
                            if (result && result.decodedText) {
                                handleRawScan(result.decodedText);
                            }
                        } catch (e) {
                            // სკანირება ვერ მოხერხდა — ნორმალური
                        }
                    }, 'image/png');
                } catch (e) {
                    // იგნორი
                }
            }, 500);
        }

        function stopH5EnhancedScan() {
            if (h5EnhanceInterval) {
                clearInterval(h5EnhanceInterval);
                h5EnhanceInterval = null;
            }
        }

        // ===== საერთო სკანირების ლოგიკა (ორივე engine-სთვის) =====
        function handleRawScan(rawCode) {
            if (!scanningActive) return;
            if (!rawCode || rawCode.trim().length === 0) return;

            const cleaned = cleanCode(rawCode);
            if (!cleaned) return;

            // Multi-scan consensus — აკუმულირება
            const confirmed = addToBuffer(cleaned);
            if (!confirmed) return;  // ჯერ არ არის კონსენსუსი

            // ✅ კონსენსუსით დადასტურებული კოდი!
            const now = Date.now();
            // დუბლიკატის ფილტრი (იგივე კოდი 3 წამში)
            if (confirmed === lastScannedCode && (now - lastScannedTime) < 3000) {
                return;
            }
            lastScannedCode = confirmed;
            lastScannedTime = now;

            // ვიბრაცია
            if (navigator.vibrate) navigator.vibrate(100);
            try { tg.HapticFeedback.notificationOccurred('success'); } catch(e) {}

            addCode(confirmed);

            document.getElementById('lastScan').textContent = '✅ ' + confirmed;
            setTimeout(() => {
                document.getElementById('lastScan').textContent = '';
            }, 2000);

            // სკანირების შემდეგ პაუზა
            pauseScanning();
        }

        // ===== ღილაკის toggle =====
        function toggleScanner() {
            if (!cameraStarted) {
                if (useNative) {
                    startNativeCamera();
                } else {
                    startHtml5Camera();
                }
            } else if (scanningActive) {
                pauseScanning();
            } else {
                resumeScanning();
            }
        }

        // სკანირების პაუზა (კამერა რჩება აქტიური!)
        function pauseScanning() {
            scanningActive = false;
            scanBuffer = [];
            stopH5EnhancedScan();
            document.getElementById('confidenceBar').textContent = '';
            const overlay = document.getElementById('scanOverlay');
            if (overlay) overlay.classList.remove('detecting');
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.textContent = '📸 სკანირება';
            scanBtn.className = 'scan-btn paused';
        }

        // სკანირების გაგრძელება (კამერა უკვე მუშაობს)
        function resumeScanning() {
            scanningActive = true;
            lastScannedCode = '';
            scanBuffer = [];
            document.getElementById('confidenceBar').textContent = '';
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.textContent = '⏸ პაუზა';
            scanBtn.className = 'scan-btn scanning';
            // html5-qrcode-ის enhanced scan-ის გაგრძელება
            if (!useNative && cameraStarted) startH5EnhancedScan();
        }

        // კოდის გაწმენდა
        function cleanCode(code) {
            code = code.trim();
            if (!code) return '';
            // -00 სუფიქსი
            code = code.replace(/-00$/, '');
            // ტირეების მოშორება
            code = code.replace(/-/g, '');
            // CODE39 start/stop *
            code = code.replace(/^\*|\*$/g, '');
            // P პრეფიქსი
            if (code.length >= 5 && /^P[A-Z0-9]/i.test(code)) {
                const withoutP = code.substring(1);
                if (/\d/.test(withoutP)) {
                    code = withoutP;
                }
            }
            return code;
        }

        function addCode(rawCode) {
            const code = cleanCode(rawCode);
            if (!code) return;

            const existingIdx = scannedItems.findIndex(item => item.code === code);
            if (existingIdx !== -1) {
                // რაოდენობა გაზარდე და სიის თავში გადაიტანე
                scannedItems[existingIdx].qty++;
                const item = scannedItems.splice(existingIdx, 1)[0];
                scannedItems.unshift(item);
            } else {
                scannedItems.unshift({ code: code, qty: 1 });
            }
            renderList();
        }

        function addManualCode() {
            const input = document.getElementById('manualCode');
            const code = input.value.trim();
            if (code) {
                addCode(code);
                input.value = '';
            }
        }

        document.getElementById('manualCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addManualCode();
            }
        });

        function changeQty(index, delta) {
            scannedItems[index].qty += delta;
            if (scannedItems[index].qty <= 0) {
                scannedItems.splice(index, 1);
            }
            renderList();
        }

        function removeItem(index) {
            scannedItems.splice(index, 1);
            renderList();
        }

        function renderList() {
            const listEl = document.getElementById('scanList');
            const sendBtn = document.getElementById('sendBtn');
            const totalBar = document.getElementById('totalBar');

            if (scannedItems.length === 0) {
                listEl.innerHTML = '<div class="empty-msg">📸 დააჭირე სკანირებას ან ხელით შეიყვანე კოდი</div>';
                sendBtn.disabled = true;
                totalBar.textContent = '';
                return;
            }

            sendBtn.disabled = false;
            let html = '';
            let totalQty = 0;

            scannedItems.forEach((item, idx) => {
                totalQty += item.qty;
                html += `
                    <div class="scan-item">
                        <div class="code">${escapeHtml(item.code)}</div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty(${idx}, -1)">−</button>
                            <span class="qty-num">${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${idx}, +1)">+</button>
                        </div>
                        <button class="remove-btn" onclick="removeItem(${idx})">✕</button>
                    </div>
                `;
            });

            listEl.innerHTML = html;
            totalBar.textContent = `სულ: ${scannedItems.length} კოდი, ${totalQty} ცალი`;
        }

        function clearAll() {
            scannedItems = [];
            lastScannedCode = '';
            scanBuffer = [];
            renderList();
            document.getElementById('statusMsg').textContent = '';
            document.getElementById('confidenceBar').textContent = '';
        }

        function openBotLink(deepLink) {
            // Telegram Mini App-ში deep link-ის გახსნა
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    // Mini App API-ით deep link-ის გახსნა — დახურავს Mini App-ს და გახსნის ბოტის ჩატს
                    window.Telegram.WebApp.openTelegramLink(deepLink);
                } else {
                    // fallback — ბრაუზერში გახსნა
                    window.open(deepLink, '_blank');
                }
            } catch (e) {
                // თუ openTelegramLink ვერ მუშაობს — fallback
                window.location.href = deepLink;
            }
        }

        function sendData() {
            if (scannedItems.length === 0) return;

            const statusMsg = document.getElementById('statusMsg');
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            statusMsg.textContent = '⏳ იგზავნება...';
            statusMsg.className = 'status-msg';

            // სკანირება გავაჩეროთ
            scanningActive = false;
            scanBuffer = [];
            stopAllCameras();

            const payload = {
                op: opType || '',
                bid: buyerId || '0',
                items: scannedItems.map(item => ({code: item.code, qty: item.qty}))
            };

            // Worker relay → deep link → ბოტში გადასვლა
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 15000);

            fetch(WORKER_URL + '/scan', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload),
                signal: controller.signal
            })
            .then(r => {
                clearTimeout(timeoutId);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(result => {
                if (result.key) {
                    const deepLink = 'https://t.me/' + BOT_NAME + '?start=SK_' + result.key;
                    statusMsg.textContent = '✅ მონაცემები შენახულია!';

                    // ცდა 1: openTelegramLink — იხურავს Mini App-ს და გახსნის ბოტს
                    let opened = false;
                    try {
                        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.openTelegramLink) {
                            window.Telegram.WebApp.openTelegramLink(deepLink);
                            opened = true;
                            // ზოგ ვერსიაზე Mini App არ იხურება — ხელით დავხუროთ
                            setTimeout(() => {
                                try { window.Telegram.WebApp.close(); } catch(e2) {}
                            }, 800);
                        }
                    } catch(e) {
                        console.log('openTelegramLink failed:', e);
                    }

                    // თუ openTelegramLink ვერ გახსნა — ვაჩვენოთ ღილაკი
                    if (!opened) {
                        statusMsg.innerHTML = '✅ შენახულია!<br><br>' +
                            '<a href="' + deepLink + '" style="display:inline-block;padding:16px 32px;' +
                            'background:#0088cc;color:#fff;border-radius:12px;text-decoration:none;' +
                            'font-size:17px;font-weight:700;">📨 გახსენი ბოტში</a><br><br>' +
                            '<span style="font-size:12px;color:#aaa;">დააჭირე ბოტში გადასასვლელად</span>';
                        statusMsg.className = 'status-msg';
                    }
                } else {
                    statusMsg.textContent = '❌ შეცდომა: ' + (result.error || 'unknown');
                    statusMsg.className = 'status-msg status-err';
                    sendBtn.disabled = false;
                }
            })
            .catch(err => {
                clearTimeout(timeoutId);
                const errMsg = err.name === 'AbortError' ? 'ტაიმაუტი — სცადე ხელახლა' : err.message;
                statusMsg.textContent = '❌ კავშირი: ' + errMsg;
                statusMsg.className = 'status-msg status-err';
                sendBtn.disabled = false;
            });
        }

        function stopAllCameras() {
            stopH5EnhancedScan();
            if (useNative) {
                stopNativeCamera();
            } else if (html5Qrcode && cameraStarted) {
                html5Qrcode.stop().then(() => {
                    cameraStarted = false;
                    const scanBtn = document.getElementById('scanBtn');
                    scanBtn.textContent = '📸 სკანირება';
                    scanBtn.className = 'scan-btn';
                }).catch(() => {});
            }
            const scanBtn = document.getElementById('scanBtn');
            scanBtn.textContent = '📸 სკანირება';
            scanBtn.className = 'scan-btn';
            torchOn = false;
            torchSupported = false;
            darkFrameCount = 0;
            autoTorchTriggered = false;
            document.getElementById('torchBtn').style.display = 'none';
            document.getElementById('torchBtn').classList.remove('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Back ღილაკი
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
            stopAllCameras();
            tg.close();
        });
    </script>
</body>
